services:
  # ─── Spring Boot Backend (Docker-based Web Service) ────────────────────────
  - type: web
    name: spring-ai-auth-backend
    env: docker
    plan: free
    dockerfilePath: spring-ai-auth-backend/Dockerfile
    dockerContext: spring-ai-auth-backend
    envVars:
      - key: PORT
        value: 8080
      - key: GOOGLE_CLIENT_ID
        sync: false # User will configure this in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false # User will configure this in Render dashboard
      - key: JWT_SECRET
        sync: false # User will configure this in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false # User will configure this in Render dashboard
      - key: FRONTEND_ORIGIN
        sync: false # User will configure this in Render dashboard (URL of frontend static site)
      - key: GOOGLE_REDIRECT_URI
        sync: false # e.g. https://spring-ai-website.onrender.com/login/callback

  # ─── Angular Frontend (Static Site) ────────────────────────────────────────
  - type: web
    name: spring-ai-website
    env: static
    plan: free
    rootDir: spring-ai-website
    buildCommand: npm run build
    publishDir: dist/spring-ai-website/browser
    routes:
      # Rewrite rule to route all frontend paths to index.html for Angular SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
