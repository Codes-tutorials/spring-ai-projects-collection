# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Google OAuth2 ────────────────────────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:4200/login/callback}

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:YOUR_SUPER_SECURE_JWT_SECRET_KEY_THAT_IS_AT_LEAST_256_BITS_LONG}
jwt.expiration=86400000

# ─── Razorpay ─────────────────────────────────────────────────────────────────
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_RAZORPAY_KEY_SECRET}

# ─── CORS ─────────────────────────────────────────────────────────────────────
frontend.origin=${FRONTEND_ORIGIN:http://localhost:4200}

# ─── Database ─────────────────────────────────────────────────────────────────
#
# LOCAL DEVELOPMENT  → H2 in-memory (no setup required, auto-creates schema)
# PRODUCTION (Render) → Set DATABASE_URL env var in Render dashboard:
#   DATABASE_URL=jdbc:postgresql://<host>:<port>/<dbname>?user=<user>&password=<pass>
#
# Render free PostgreSQL connection string format:
#   postgresql://<user>:<password>@<host>/<dbname>
#   → Convert to JDBC: jdbc:postgresql://<host>/<dbname>?user=<user>&password=<pass>
#
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:springai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 console — accessible at http://localhost:8080/h2-console (dev only)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# HikariCP connection pool — tuned for Render free tier (1 shared CPU)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.com.springai.auth=DEBUG
logging.level.org.hibernate.SQL=${HIBERNATE_LOG:WARN}
