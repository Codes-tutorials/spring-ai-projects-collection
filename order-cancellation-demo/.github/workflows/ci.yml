name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Docker
    runs-on: ubuntu-latest

    services:
      # Redis for integration tests that need it
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test -Dspring.profiles.active=test --no-transfer-progress

      - name: Run integration tests
        run: mvn failsafe:integration-test failsafe:verify -Dspring.profiles.active=test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Build Docker image
        run: docker build -t order-cancellation-demo:${{ github.sha }} .

      - name: Verify Docker image starts
        run: |
          docker run -d --name test-app \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SPRING_DATA_REDIS_HOST=localhost \
            -e SPRING_RABBITMQ_HOST=localhost \
            -p 8080:8080 \
            order-cancellation-demo:${{ github.sha }}
          sleep 20
          curl --fail http://localhost:8080/actuator/health/liveness || (docker logs test-app && exit 1)
          docker rm -f test-app

  # Optional: push to registry on main branch
  push-image:
    name: Push to Container Registry
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
